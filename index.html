<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cabildo — el software para gestionar tu hermandad o cofradía: hermanos, cuotas, papeletas de sitio, cortejo, tesorería y comunicaciones." />
    <title>Cabildo — Software para gestionar tu hermandad</title>
    <script>
      // Aplica el tema guardado antes de pintar para evitar parpadeo
      (function () {
        try {
          var t = localStorage.getItem('cabildo-theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
